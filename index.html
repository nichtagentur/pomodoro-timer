<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pomodoro Timer</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Pomodoro</h1>

    <div class="modes" role="tablist">
      <button class="mode active" data-mode="focus" data-minutes="25">Focus</button>
      <button class="mode" data-mode="short" data-minutes="5">Short Break</button>
      <button class="mode" data-mode="long" data-minutes="15">Long Break</button>
    </div>

    <div class="timer" id="timer">25:00</div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="resetBtn">Reset</button>
    </div>

    <p class="status" id="status">Ready to focus.</p>
    <p class="cycles">Completed sessions: <span id="cycleCount">0</span></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
